{% extends "base.html" %}
{% block title %}DevAgent — Projekte{% endblock %}

{% block content %}
<div class="space-y-6">

  <!-- Header -->
  <div class="flex items-center justify-between flex-wrap gap-3">
    <div>
      <h1 class="text-2xl font-bold tracking-tight">Projekte</h1>
      <p class="text-sm text-slate-400 mt-1">Manuell verwaltete DevAgent-Projekte</p>
    </div>
    <div class="flex gap-2">
      <!-- Import aus ~/development -->
      <button hx-get="/import"
              hx-target="#side-panel"
              hx-swap="innerHTML"
              class="text-sm bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 rounded-lg px-4 py-2 transition-colors shadow-sm">
        📂 Aus ~/development importieren
      </button>
      <!-- Manuell hinzufügen -->
      <button hx-get="/projects/add-form"
              hx-target="#side-panel"
              hx-swap="innerHTML"
              class="text-sm bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg px-4 py-2 transition-colors shadow-sm">
        + Projekt hinzufügen
      </button>
    </div>
  </div>

  <!-- Two-column: list + side panel -->
  <div class="flex gap-6 items-start">

    <!-- Project list -->
    <div class="flex-1 min-w-0 space-y-3">
      <div id="project-list">
        {% include "partials/project_list.html" %}
      </div>
    </div>

    <!-- Side panel: add form / import / detail -->
    <div id="side-panel" class="w-96 shrink-0 sticky top-6"></div>

  </div>
</div>
{% endblock %}
