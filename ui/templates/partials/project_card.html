<div class="bg-drac-surface border border-drac-line rounded-xl p-4 flex flex-col gap-2.5 shadow-sm hover:shadow-lg hover:border-drac-comment transition-all">

  <!-- Header -->
  <div class="flex items-start justify-between gap-2">
    <div class="min-w-0">
      <h2 class="font-semibold text-sm text-drac-fg">{{ p.name }}</h2>
      <p class="text-xs text-drac-comment font-mono mt-0.5 truncate">{{ p.local_path }}</p>
    </div>
    {% if p.initialized %}
      <span class="text-xs bg-drac-green/10 text-drac-green border border-drac-green/30 rounded-full px-2.5 py-0.5 font-medium shrink-0">✓ Matrix</span>
    {% else %}
      <span class="text-xs bg-drac-orange/10 text-drac-orange border border-drac-orange/30 rounded-full px-2.5 py-0.5 font-medium shrink-0">kein Raum</span>
    {% endif %}
  </div>

  {% if p.initialized %}
  <div class="text-xs text-drac-comment bg-drac-bg rounded-lg px-3 py-1.5 font-mono truncate border border-drac-line">
    {{ p.matrix_room_name or p.matrix_room_id }}
  </div>
  {% endif %}

  <!-- Actions -->
  <div class="flex flex-wrap gap-1.5 mt-auto">

    <button hx-get="/projects/{{ p.name }}"
            hx-target="#side-panel"
            hx-swap="innerHTML"
            class="text-xs bg-drac-line/40 hover:bg-drac-line text-drac-fg rounded-lg px-3 py-1.5 transition-colors font-medium">
      Details
    </button>

    {% if p.initialized %}
      <button hx-post="/projects/{{ p.name }}/tmux"
              hx-target="#tmux-{{ p.name }}"
              hx-swap="innerHTML"
              class="text-xs bg-drac-purple hover:bg-[#a57ee8] text-drac-bg rounded-lg px-3 py-1.5 transition-colors font-medium">
        tmux
      </button>
    {% else %}
      <button hx-get="/projects/{{ p.name }}/room-form"
              hx-target="#room-form-{{ p.name }}"
              hx-swap="innerHTML"
              class="text-xs bg-drac-cyan/20 hover:bg-drac-cyan/30 text-drac-cyan border border-drac-cyan/30 rounded-lg px-3 py-1.5 transition-colors font-medium">
        + Matrix verknüpfen
      </button>
    {% endif %}

    <button hx-delete="/projects/{{ p.name }}"
            hx-target="#project-list"
            hx-swap="innerHTML"
            hx-confirm="Projekt «{{ p.name }}» aus der Registry entfernen?"
            class="text-xs bg-drac-red/10 hover:bg-drac-red/20 text-drac-red border border-drac-red/20 rounded-lg px-3 py-1.5 transition-colors ml-auto">
      ✕
    </button>

  </div>

  <div id="tmux-{{ p.name }}" class="text-xs"></div>
  <div id="room-form-{{ p.name }}"></div>

</div>
