<!doctype html>
<html lang="de" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DevAgent{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            drac: {
              bg:      '#282a36',
              surface: '#21222c',
              line:    '#44475a',
              fg:      '#f8f8f2',
              comment: '#6272a4',
              cyan:    '#8be9fd',
              green:   '#50fa7b',
              orange:  '#ffb86c',
              pink:    '#ff79c6',
              purple:  '#bd93f9',
              red:     '#ff5555',
              yellow:  '#f1fa8c',
            }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .htmx-indicator { opacity: 0; transition: opacity 150ms; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .nav-active {
      color: #f8f8f2 !important;
      background-color: rgba(68,71,90,0.6);
      border-radius: 6px;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #21222c; }
    ::-webkit-scrollbar-thumb { background: #44475a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #6272a4; }
  </style>
</head>
<body class="min-h-full bg-drac-bg text-drac-fg font-sans">

  <!-- Navbar -->
  <nav class="bg-drac-surface border-b border-drac-line px-6 py-0 flex items-center gap-1">
    <a href="/" class="text-base font-bold tracking-tight py-3 pr-4 mr-2"
       style="background: linear-gradient(90deg, #bd93f9, #8be9fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
      DevAgent
    </a>

    {% set path = request.url.path %}
    <a href="/"
       class="text-sm text-drac-comment hover:text-drac-fg px-3 py-3 transition-colors {% if path == '/' %}nav-active{% endif %}">
      Projekte
    </a>
    <a href="/jobs"
       class="text-sm text-drac-comment hover:text-drac-fg px-3 py-3 transition-colors flex items-center gap-1.5 {% if path.startswith('/jobs') %}nav-active{% endif %}">
      Jobs
      <span id="nav-running-badge"
            hx-get="/api/stats"
            hx-trigger="load, every 30s"
            hx-swap="outerHTML"
            hx-select="#nav-running-badge"></span>
    </a>
    <a href="/logs"
       class="text-sm text-drac-comment hover:text-drac-fg px-3 py-3 transition-colors {% if path == '/logs' %}nav-active{% endif %}">
      Logs
    </a>
    <a href="/todos"
       class="text-sm text-drac-comment hover:text-drac-fg px-3 py-3 transition-colors {% if path == '/todos' %}nav-active{% endif %}">
      TODOs
    </a>
    <a href="/backends"
       class="text-sm text-drac-comment hover:text-drac-fg px-3 py-3 transition-colors {% if path == '/backends' %}nav-active{% endif %}">
      Backends
    </a>

    <div class="ml-auto flex items-center gap-3 py-3">
      <!-- Worker status -->
      <div id="worker-status"
           hx-get="/api/worker/status"
           hx-trigger="load, every 30s"
           hx-swap="innerHTML">
        <span class="text-xs text-drac-comment">…</span>
      </div>
      <span class="text-xs text-drac-line font-mono">v0.1</span>
      <form method="post" action="/logout" class="inline">
        <button type="submit" class="text-xs text-drac-comment hover:text-drac-red transition-colors">Abmelden</button>
      </form>
    </div>
  </nav>

  <!-- Offline banner (hidden by default) -->
  <div id="offline-banner"
       style="display:none; position:fixed; top:0; left:0; right:0; z-index:9999;
              background:#ff5555; color:#f8f8f2; text-align:center;
              padding:6px 12px; font-size:0.8rem; font-weight:600; letter-spacing:0.03em;">
    ⚠ Verbindung zum Server unterbrochen — Verbindung wird wiederhergestellt …
  </div>

  <main class="max-w-6xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <script>
  (function () {
    'use strict';
    var FAIL_THRESHOLD = 3;   // consecutive HTMX failures before showing banner
    var HEALTH_INTERVAL = 10; // seconds between /api/health pings when offline
    var _fails = 0;
    var _offline = false;
    var _healthTimer = null;
    var banner = document.getElementById('offline-banner');

    function _setOffline() {
      if (_offline) return;
      _offline = true;
      banner.style.display = 'block';
      // Push banner down by its own height so navbar isn't obscured
      document.body.style.paddingTop = (banner.offsetHeight + 4) + 'px';
      // Pause HTMX polling elements by switching their trigger to "never"
      document.querySelectorAll('[hx-trigger*="every"]').forEach(function (el) {
        el.setAttribute('data-saved-trigger', el.getAttribute('hx-trigger'));
        htmx.trigger(el, 'htmx:abort');
        el.setAttribute('hx-trigger', 'da-reconnect');  // custom event only
        htmx.process(el);
      });
      _healthTimer = setInterval(_checkHealth, HEALTH_INTERVAL * 1000);
    }

    function _setOnline() {
      if (!_offline) return;
      _offline = false;
      _fails = 0;
      clearInterval(_healthTimer);
      banner.style.display = 'none';
      document.body.style.paddingTop = '';
      // Restore HTMX polling and fire immediately
      document.querySelectorAll('[hx-trigger="da-reconnect"]').forEach(function (el) {
        var saved = el.getAttribute('data-saved-trigger') || 'every 30s';
        el.setAttribute('hx-trigger', saved);
        el.removeAttribute('data-saved-trigger');
        htmx.process(el);
        htmx.trigger(el, 'load');
      });
    }

    function _checkHealth() {
      fetch('/api/health', { method: 'GET', credentials: 'same-origin' })
        .then(function (r) { if (r.ok) _setOnline(); })
        .catch(function () {});
    }

    // Track HTMX request failures
    document.body.addEventListener('htmx:sendError', function () {
      _fails += 1;
      if (_fails >= FAIL_THRESHOLD) _setOffline();
    });
    document.body.addEventListener('htmx:responseError', function (evt) {
      // Only count server errors (5xx), not 4xx auth issues
      var status = evt.detail && evt.detail.xhr && evt.detail.xhr.status;
      if (status && status >= 500) {
        _fails += 1;
        if (_fails >= FAIL_THRESHOLD) _setOffline();
      }
    });
    document.body.addEventListener('htmx:afterRequest', function (evt) {
      var ok = evt.detail && evt.detail.successful;
      if (ok && _fails > 0) {
        _fails = 0;
        if (_offline) _setOnline();
      }
    });

    // Native browser online/offline events as fast signal
    window.addEventListener('offline', _setOffline);
    window.addEventListener('online', function () {
      // Browser says online — verify with health check before restoring
      _checkHealth();
    });
  })();
  </script>

</body>
</html>
