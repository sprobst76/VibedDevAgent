<!doctype html>
<html lang="de" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DevAgent{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .htmx-indicator { opacity: 0; transition: opacity 150ms; }
    .htmx-request .htmx-indicator { opacity: 1; }
  </style>
</head>
<body class="min-h-full bg-slate-50 text-slate-800 font-sans">

  <!-- Navbar -->
  <nav class="bg-white border-b border-slate-200 px-6 py-3 flex items-center gap-4">
    <span class="text-lg font-bold tracking-tight text-emerald-700">DevAgent</span>
    <span class="text-slate-300">|</span>
    <a href="/" class="text-sm text-slate-600 hover:text-emerald-700 transition-colors">Projekte</a>
    <a href="/logs" class="text-sm text-slate-600 hover:text-emerald-700 transition-colors">Logs</a>
    <div class="ml-auto flex items-center gap-3">
      <!-- Worker status indicator — auto-refresh every 30s -->
      <div id="worker-status"
           hx-get="/api/worker/status"
           hx-trigger="load, every 30s"
           hx-swap="innerHTML">
        <span class="text-xs text-slate-400">…</span>
      </div>
      <span class="text-xs text-slate-400 font-mono">v0.1</span>
      <form method="post" action="/logout" class="inline">
        <button type="submit" class="text-xs text-slate-400 hover:text-red-500 transition-colors">Abmelden</button>
      </form>
    </div>
  </nav>


  <main class="max-w-5xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
