<!doctype html>
<html lang="de" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DevAgent · Anmelden</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-full bg-slate-50 flex items-center justify-center">
  <div class="w-full max-w-sm bg-white border border-slate-200 rounded-2xl shadow-sm p-8">
    <h1 class="text-xl font-bold text-emerald-700 mb-1">DevAgent</h1>
    <p class="text-sm text-slate-500 mb-6">Bitte API-Schlüssel eingeben.</p>

    {% if error %}
    <p class="mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
      {{ error }}
    </p>
    {% endif %}

    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <label class="block text-xs font-medium text-slate-600 mb-1" for="api_key">API-Schlüssel</label>
      <input
        id="api_key"
        name="api_key"
        type="password"
        autocomplete="current-password"
        required
        autofocus
        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 mb-4"
        placeholder="••••••••"
      >
      <button
        type="submit"
        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg px-4 py-2 text-sm transition-colors"
      >
        Anmelden
      </button>
    </form>
  </div>
</body>
</html>
