<div class="space-y-2">

  <div class="flex items-center justify-between">
    <span class="text-xs font-mono text-drac-comment">
      {{ name }}/CLAUDE.md
      {% if not exists %}<span class="text-drac-orange ml-1">(noch nicht vorhanden)</span>{% endif %}
    </span>
    <button type="button"
            onclick="document.getElementById('claude-md-wrap-{{ name }}').classList.toggle('hidden')"
            class="text-xs text-drac-comment hover:text-drac-fg transition-colors">einklappen</button>
  </div>

  <div id="claude-md-wrap-{{ name }}">
    <form hx-post="/projects/{{ name }}/claude-md"
          hx-target="#claude-md-status-{{ name }}"
          hx-swap="innerHTML"
          class="space-y-2">
      <textarea name="content"
                rows="14"
                class="w-full text-xs font-mono bg-drac-bg border border-drac-line rounded-lg px-3 py-2
                       text-drac-fg focus:outline-none focus:ring-2 focus:ring-drac-purple/50
                       focus:border-drac-purple resize-y"
      >{{ content }}</textarea>
      <div class="flex items-center gap-3">
        <button type="submit"
                class="text-xs bg-drac-purple hover:bg-[#a57ee8] text-drac-bg rounded-lg px-3 py-1.5 transition-colors font-medium">
          Speichern
        </button>
        <span id="claude-md-status-{{ name }}" class="text-xs text-drac-comment"></span>
      </div>
    </form>
  </div>

</div>
