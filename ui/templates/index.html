{% extends "base.html" %}
{% block title %}DevAgent — Projekte{% endblock %}

{% block content %}
<div class="space-y-6">

  <!-- Dashboard stat cards -->
  <div id="stat-cards"
       hx-get="/partials/stats"
       hx-trigger="load, every 60s"
       hx-swap="innerHTML">
    <!-- skeleton while loading -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 animate-pulse">
      {% for _ in range(4) %}
      <div class="bg-drac-surface border border-drac-line rounded-xl p-4 h-16"></div>
      {% endfor %}
    </div>
  </div>

  <!-- Header -->
  <div class="flex items-center justify-between flex-wrap gap-3">
    <div>
      <h1 class="text-xl font-bold tracking-tight text-drac-fg">Projekte</h1>
    </div>
    <div class="flex gap-2">
      <button hx-get="/import"
              hx-target="#side-panel"
              hx-swap="innerHTML"
              class="text-sm bg-drac-surface border border-drac-line hover:border-drac-comment text-drac-comment hover:text-drac-fg rounded-lg px-4 py-2 transition-colors">
        📂 Aus ~/development importieren
      </button>
      <button hx-get="/projects/add-form"
              hx-target="#side-panel"
              hx-swap="innerHTML"
              class="text-sm bg-drac-purple hover:bg-[#a57ee8] text-drac-bg font-medium rounded-lg px-4 py-2 transition-colors">
        + Projekt hinzufügen
      </button>
    </div>
  </div>

  <!-- Two-column: list + side panel -->
  <div class="flex gap-6 items-start">
    <div class="flex-1 min-w-0 space-y-3">
      <div id="project-list">
        {% include "partials/project_list.html" %}
      </div>
    </div>
    <div id="side-panel" class="w-96 shrink-0 sticky top-6"></div>
  </div>

</div>

<script>
document.body.addEventListener("htmx:afterSwap", function(e) {
  if (e.detail.target && e.detail.target.id === "stat-cards") {
    // already replaced by server response
  }
});
</script>
{% endblock %}
